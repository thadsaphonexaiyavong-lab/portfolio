<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Curriculum Vitae</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cv-page-wrapper {
            background-color: #0b0b0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .cv-controls {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
        }
        .cv-preview-container {
            width: 100%;
            max-width: 900px;
            height: 1100px; /* ปรับตามความเหมาะสม */
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="cv-page-wrapper">
        <div class="cv-controls">
            <a href="index.html" class="btn btn-outline">← Back</a>
            
            <a href="./pictures/my-cv.pdf" download="Resume_Name.pdf" class="btn btn-primary">
                Download PDF
            </a>
        </div>

        <div class="cv-preview-container">
            <iframe src="./pictures/my-cv.pdf"></iframe>
        </div>
    </div>
</body>
</html>
